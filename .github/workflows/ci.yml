name: CI

# 安全说明：workflow 不消费任何用户可控输入（github.event.*.body/title/ref 等），
# 所有 run 命令都是静态字符串，无命令注入风险。

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'frontend/data/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solidity:
    name: Solidity Tests (Foundry)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Foundry versions
        run: |
          forge --version
          cast --version

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vv

  typescript:
    name: TypeScript Tests + Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run TypeScript tests
        run: npm run test:ts
